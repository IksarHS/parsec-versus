<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Par Sec — Star Map</title>
  <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'&gt;&lt;circle cx='8' cy='8' r='6' fill='%23ffffff'/&gt;&lt;circle cx='11.3' cy='8' r='1.4' fill='%23000' opacity='.28'/&gt;&lt;circle cx='6.35' cy='10.86' r='1.4' fill='%23000' opacity='.28'/&gt;&lt;circle cx='6.35' cy='5.14' r='1.4' fill='%23000' opacity='.28'/&gt;&lt;/svg&gt;">
  <link rel="preload" href="assets/fonts/DepartureMono-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <style>
    @font-face {
      font-family: 'Departure Mono';
      src: url('assets/fonts/DepartureMono-Regular.woff2') format('woff2'),
           url('assets/fonts/DepartureMono-Regular.woff') format('woff');
      font-display: block;
    }
    html, body { margin: 0; background: #08090f; overflow: hidden; }
    body { display: flex; align-items: center; justify-content: center; height: 100vh; }
    canvas { display: block; cursor: pointer; max-width: 100vw; max-height: 100vh; }
    /* PORTRAIT (phone): the fixed 16:9 canvas, centred, shrank to a thin band stranded mid-screen with huge
       letterbox bars above + below (the in-game iframe opened on a phone). In a PORTRAIT viewport instead
       FILL THE WIDTH and pin to the TOP so the map reads as a full-bleed panel (the internal 960x540 layout
       — which already scrolls — is untouched, so no row reflow / text-overlap risk). Landscape (vw > vh) is
       byte-identical: this query never matches there. */
    @media (orientation: portrait) {
      body { align-items: flex-start; }
      canvas { width: 100vw; height: auto; max-height: none; }
    }
  </style>
</head>
<body>
<canvas id="c" width="960" height="540"></canvas>
<!-- The star map screen. Pulls the real tour itinerary from planet-gen.js (loaded via a tiny
     shim that defines WORLDS so planet-gen registers, then reads SOLAR_ITINERARY + course data). -->
<script src="src/starmap-data.js"></script>
<script src="src/planet-gen.js"></script>
<!-- META: the per-planet scores store (RG_SCORES). Reads localStorage directly, so when this map
     runs (standalone OR as the in-game overlay iframe) it shows the player's REAL scores + frontier.
     Absent → starmap.js falls back to its dev reveal-slider demo. -->
<script src="src/roguelike/profile.js"></script>
<script src="src/starmap.js"></script>
</body>
</html>
